const getProfile = (answers) => {
  const totals = { overlooked: 0, stalled: 0, busy: 0, relauncher: 0, ready: 0 };
  answers.forEach((ans) => {
    if (!ans) return;
    Object.entries(ans.scores).forEach(([k, v]) => { totals[k] += v; });
  });
  return Object.entries(totals).sort((a, b) => b[1] - a[1])[0][0];
};

function ExperienceQuiz() {
  const [state, setState] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch {}
    return { screen: "intro", answers: [], currentQ: 0, name: "", email: "", profile: null };
  });

  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {} }, [state]);

  const set = (updates) => setState((prev) => ({ ...prev, ...updates }));

  const selectAnswer = (option) => {
    const answers = [...state.answers];
    answers[state.currentQ] = option;
    if (state.currentQ < QUESTIONS.length - 1) {
      set({ answers, currentQ: state.currentQ + 1 });
    } else {
      set({ answers, screen: "capture" });
    }
  };

  const goBack = () => {
    if (state.currentQ > 0) set({ currentQ: state.currentQ - 1 });
    else set({ screen: "intro" });
  };

  const showResults = () => {
    if (!state.name.trim() || !state.email.trim()) return;
    const profile = getProfile(state.answers);
    set({ profile, screen: "results" });
  };

  const reset = () => {
    setState({ screen: "intro", answers: [], currentQ: 0, name: "", email: "", profile: null });
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
  };

  const progress = Math.round((state.currentQ / QUESTIONS.length) * 100);
  const profile = state.profile ? PROFILES[state.profile] : null;

  const c = {
    cream: "#F0EDE8", sage: "#8A9E8C", brown: "#3D1C02",

    muted: "#A89880", border: "#E0D9D1", light: "#EDE8E2",
  };

  const S = {

    inner: { width: "100%", maxWidth: 620 },
    brandBar: { width: "100%", maxWidth: 620, paddingTop: 36, paddingBottom: 20, marginBottom: 8 },
    brandLabel: { fontFamily: "'Lora', serif", fontSize: 13, color: c.taupe, letterSpacing: "0.06em" },
    card: { background: c.offwhite, borderRadius: 20, padding: "40px 44px", boxShadow: "0 4px 32px rgba(61,28,2,0.08)", marginBottom: 16 },
    eyebrow: { fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", color: c.sage, fontWeight: 700, marginBottom: 12 },
    btn: { background: c.brown, color: c.offwhite, border: "none", borderRadius: 12, padding: "15px 32px", fontSize: 14, fontWeight: 700, fontFamily: "'Poppins', sans-serif", cursor: "pointer", letterSpacing: "0.04em", width: "100%" },
    btnOutline: { background: "transparent", color: c.brown, border: `2px solid ${c.brown}`, borderRadius: 12, padding: "13px 28px", fontSize: 14, fontWeight: 700, fontFamily: "'Poppins', sans-serif", cursor: "pointer", width: "100%" },
    btnGhost: { background: "transparent", color: c.muted, border: `1px solid ${c.border}`, borderRadius: 8, padding: "7px 16px", fontSize: 12, fontWeight: 600, fontFamily: "'Poppins', sans-serif", cursor: "pointer" },
    input: { width: "100%", padding: "14px 18px", borderRadius: 12, border: `2px solid ${c.border}`, background: c.cream, fontSize: 15, fontFamily: "'Poppins', sans-serif", color: c.brown, outline: "none", boxSizing: "border-box" },
    optionBtn: (selected) => ({
      width: "100%", textAlign: "left", padding: "16px 20px", borderRadius: 12,
      border: selected ? `2px solid ${c.brown}` : `2px solid ${c.border}`,
      background: selected ? c.cream : "transparent",
      color: c.brown, fontSize: 14, fontFamily: "'Poppins', sans-serif",
      cursor: "pointer", fontWeight: selected ? 600 : 400, lineHeight: 1.6,
      transition: "all 0.15s ease", marginBottom: 10,
      display: "block",
    }),
  };

  // INTRO
  if (state.screen === "intro") {
    return (

        <div style={{ ...S.inner }}>
          <div style={{ ...S.card, textAlign: "center" }}>

              Find Your Starting Point

            <p style={{ fontSize: 13, color: c.muted, lineHeight: 1.7, marginBottom: 32 }}>

            <div style={{ display: "flex", gap: 20, justifyContent: "center", marginBottom: 36 }}>

            <p style={S.eyebrow}>You Are Almost There</p>
            <h2 style={{ fontFamily: "'Lora', serif", fontSize: 24, fontWeight: 700, color: c.brown, lineHeight: 1.4, marginBottom: 12 }}>
              Your results are ready.
            </h2>
            <p style={{ fontSize: 14, color: "#6b5a4e", lineHeight: 1.7, marginBottom: 28 }}>

            </p>
            <div style={{ textAlign: "left" }}>
              <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: c.brown, marginBottom: 6 }}>First Name</label>
              <input style={{ ...S.input, marginBottom: 16 }} placeholder="Your first name" value={state.name} onChange={(e) => set({ name: e.target.value })} />
              <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: c.brown, marginBottom: 6 }}>Email Address</label>
              <input style={{ ...S.input, marginBottom: 28 }} type="email" placeholder="you@example.com" value={state.email} onChange={(e) => set({ email: e.target.value })} />
            </div>
            <button
              style={{ ...S.btn, ...(!canSubmit ? { opacity: 0.35, cursor: "not-allowed" } : {}) }}
              disabled={!canSubmit}
              onClick={showResults}
            >
              Show Me My Results
            </button>
            <p style={{ fontSize: 11, color: c.muted, marginTop: 14, lineHeight: 1.6 }}>
              Your information will never be shared or sold. You will receive your results and may hear from The Burks Collective. You can unsubscribe at any time.
            </p>
          </div>
        </div>
      </div>
    );
  }

  // RESULTS
  if (state.screen === "results" && profile) {
    return (
      <div style={S.wrap}>
        <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <div style={S.brandBar}><p style={S.brandLabel}>The Burks Collective</p></div>

          <div style={{ ...S.card, background: c.brown, textAlign: "center", marginBottom: 16 }}>

            </p>
            <div style={{ width: 56, height: 56, borderRadius: "50%", background: profile.color, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: 22, color: c.offwhite }}>
              {profile.icon}

            <h1 style={{ fontFamily: "'Lora', serif", fontSize: 30, fontWeight: 700, color: c.offwhite, lineHeight: 1.3, margin: "0 0 12px" }}>
              {profile.type}
            </h1>
            <p style={{ fontSize: 15, color: c.taupe, fontStyle: "italic", lineHeight: 1.6, margin: 0 }}>
              {profile.tagline}

          </div>

          {/* Description */}
          <div style={S.card}>

            <div style={{ ...S.card, flex: 1, minWidth: 220, borderTop: `4px solid ${c.sage}` }}>

              <p style={{ fontSize: 14, color: c.brown, lineHeight: 1.8, margin: 0 }}>{profile.needs}</p>

          {/* Toolkit CTA */}

            <a
              href="https://knifieburks.com"
              target="_blank"
              rel="noopener noreferrer"
              style={{ display: "block", background: c.offwhite, color: c.brown, borderRadius: 12, padding: "16px 28px", fontSize: 14, fontWeight: 700, fontFamily: "'Poppins', sans-serif", textAlign: "center", textDecoration: "none", letterSpacing: "0.04em" }}
            >
              Get From Experience to Income: The Complete Toolkit
            </a>
            <p style={{ fontSize: 12, color: "rgba(250,248,245,0.7)", textAlign: "center", marginTop: 12, marginBottom: 0 }}>
              Everything you need to go from idea to income. All in one place.
            </p>
          </div>

          {/* Other profiles teaser */}
          <div style={{ ...S.card, marginBottom: 16 }}>
            <p style={S.eyebrow}>The Five Profiles</p>
            <p style={{ fontSize: 13, color: "#6b5a4e", marginBottom: 20, lineHeight: 1.7 }}>
              Every woman who takes this quiz falls into one of these five places. Wherever you are, the toolkit meets you there.
            </p>
            {Object.values(PROFILES).map((p, i) => {
              const isYours = p.type === profile.type;
              return (
                <div key={i} style={{ display: "flex", gap: 12, alignItems: "center", padding: "11px 0", borderBottom: i < Object.values(PROFILES).length - 1 ? `1px solid ${c.light}` : "none" }}>
                  <div style={{ width: 28, height: 28, borderRadius: "50%", background: isYours ? p.color : c.light, display: "flex", alignItems: "center", justifyContent: "center", color: isYours ? c.offwhite : c.muted, fontSize: 12, flexShrink: 0 }}>{p.icon}</div>
                  <p style={{ fontSize: 13, fontWeight: isYours ? 700 : 400, color: isYours ? c.brown : c.muted, margin: 0 }}>
                    {p.type} {isYours && <span style={{ fontSize: 11, background: c.sage, color: c.offwhite, borderRadius: 6, padding: "2px 8px", marginLeft: 6, fontWeight: 700 }}>You</span>}
                  </p>
                </div>
              );
            })}
          </div>

          <div style={{ textAlign: "center" }}>
            <button style={S.btnGhost} onClick={reset}>Retake the Quiz</button>
          </div>
        </div>
      </div>
    );
  }

  return null;
}


const domContainer = document.getElementById('root');
const root = ReactDOM.createRoot(domContainer);
root.render(React.createElement(ExperienceQuiz));
</script>
</body>
</html>
