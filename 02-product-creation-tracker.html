<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Creation Tracker | The Burks Collective</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #F0EDE8; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;


const STORAGE_KEY = "burks_product_tracker";

const PRESET_STAGES = [
  {
    id: "clarity",
    name: "Clarity",
    description: "Define your product idea, audience, and outcome",
    tasks: [
      "Name your product (working title is fine)",
      "Write one sentence describing who this is for and what it does for them",
      "Complete the Idea Validation Scorecard",
      "Complete the Niche Narrowing Guide",
    ],
  },
  {
    id: "outline",
    name: "Outline",
    description: "Map the structure before you build anything",
    tasks: [
      "List every section or module your product will include",
      "Write 3 to 5 key outcomes the buyer will achieve",
      "Decide your product format (workbook, guide, mini-course, template, toolkit)",
      "Set your target completion date",
    ],
  },
  {
    id: "creation",
    name: "Creation",
    description: "Build the product from your outline",
    tasks: [
      "Draft Section 1",
      "Draft Section 2",
      "Draft Section 3",
      "Draft Section 4",
      "Review and refine full draft",
      "Add any visuals, examples, or worksheets",
    ],
  },
  {
    id: "packaging",
    name: "Packaging",
    description: "Make it look and feel like something worth buying",
    tasks: [
      "Design your cover or product mockup",
      "Format the product consistently",
      "Write your product description (2 to 3 sentences)",
      "Export to final delivery format (PDF, video, etc.)",
    ],
  },
  {
    id: "pricing",
    name: "Pricing & Setup",
    description: "Get the product ready to sell",
    tasks: [
      "Complete the Pricing Calculator",
      "Set your final price",
      "Upload product to your delivery platform",
      "Set up your payment link or checkout page",
      "Test the full purchase and delivery flow",
    ],
  },
  {
    id: "launch",
    name: "Launch",
    description: "Put it in front of the people who need it",
    tasks: [
      "Write your launch email",
      "Schedule your 30-Day Visibility Plan",
      "Announce on your primary platform",
      "Send to your email list",
      "Follow up with anyone who expressed interest",
    ],
  },
];

const MOTIVATIONAL = [
  { max: 10, message: "Every product that has ever sold started exactly where you are. The first step counts." },
  { max: 25, message: "You're moving. That's already more than most people do. Keep going." },
  { max: 40, message: "The foundation is being laid. What you're building now is the hardest part, and you're doing it." },
  { max: 55, message: "You're past the halfway point. The finish line is closer than the starting line now." },
  { max: 70, message: "You're in the final stretch. Don't let perfectionism slow you down here." },
  { max: 90, message: "Almost there. A product that's 90% done is still not making money. Finish it." },
  { max: 100, message: "You built something. That is not a small thing. Now it's time to let people find it." },
];

const defaultProduct = () => ({
  id: Date.now(),
  name: "",
  stages: PRESET_STAGES.map((s) => ({
    ...s,
    tasks: s.tasks.map((t) => ({ text: t, done: false })),
    custom: false,
  })),
  startDate: new Date().toISOString().split("T")[0],
  launched: false,
});

function ProductCreationTracker() {
  const [screen, setScreen] = useState("dashboard");
  const [products, setProducts] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch {}
    return [];
  });
  const [activeId, setActiveId] = useState(null);
  const [newName, setNewName] = useState("");
  const [activeStageId, setActiveStageId] = useState(null);
  const [editingTask, setEditingTask] = useState(null);
  const [newTaskText, setNewTaskText] = useState("");
  const [addingTaskStage, setAddingTaskStage] = useState(null);
  const [newStageText, setNewStageText] = useState("");
  const [addingStage, setAddingStage] = useState(false);

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); } catch {}
  }, [products]);

  const activeProduct = products.find((p) => p.id === activeId);

  const calcProgress = (product) => {
    const all = product.stages.flatMap((s) => s.tasks);
    if (!all.length) return 0;
    return Math.round((all.filter((t) => t.done).length / all.length) * 100);
  };

  const currentStage = (product) => {
    for (const stage of product.stages) {
      if (stage.tasks.some((t) => !t.done)) return stage.name;
    }
    return "Complete";
  };

  const motivation = (pct) => {
    const found = MOTIVATIONAL.find((m) => pct <= m.max);
    return found ? found.message : MOTIVATIONAL[MOTIVATIONAL.length - 1].message;
  };

  const updateProduct = (id, updater) => {
    setProducts((prev) => prev.map((p) => p.id === id ? updater(p) : p));
  };

  const toggleTask = (stageId, taskIndex) => {
    updateProduct(activeId, (p) => ({
      ...p,
      stages: p.stages.map((s) =>
        s.id === stageId
          ? { ...s, tasks: s.tasks.map((t, i) => i === taskIndex ? { ...t, done: !t.done } : t) }
          : s
      ),
    }));
  };

  const addTask = (stageId) => {
    if (!newTaskText.trim()) return;
    updateProduct(activeId, (p) => ({
      ...p,
      stages: p.stages.map((s) =>
        s.id === stageId ? { ...s, tasks: [...s.tasks, { text: newTaskText.trim(), done: false }] } : s
      ),
    }));
    setNewTaskText("");
    setAddingTaskStage(null);
  };

  const deleteTask = (stageId, taskIndex) => {
    updateProduct(activeId, (p) => ({
      ...p,
      stages: p.stages.map((s) =>
        s.id === stageId ? { ...s, tasks: s.tasks.filter((_, i) => i !== taskIndex) } : s
      ),
    }));
  };

  const addStage = () => {
    if (!newStageText.trim()) return;
    updateProduct(activeId, (p) => ({
      ...p,
      stages: [...p.stages, {
        id: "custom_" + Date.now(),
        name: newStageText.trim(),
        description: "Custom stage",
        tasks: [],
        custom: true,
      }],
    }));
    setNewStageText("");
    setAddingStage(false);
  };

  const c = {
    cream: "#F0EDE8", sage: "#8A9E8C", brown: "#3D1C02",
    taupe: "#C4A882", offwhite: "#FAF8F5", charcoal: "#2C2C2C",
    muted: "#A89880", border: "#E0D9D1", light: "#EDE8E2",
  };

  const S = {
    wrap: { minHeight: "100vh", background: c.cream, fontFamily: "'Poppins', sans-serif", padding: "0 16px 80px" },
    inner: { maxWidth: 720, margin: "0 auto" },
    header: { paddingTop: 40, paddingBottom: 24, borderBottom: `1px solid ${c.taupe}`, marginBottom: 36 },
    brandLabel: { fontFamily: "'Lora', serif", fontSize: 13, color: c.taupe, letterSpacing: "0.06em", marginBottom: 4 },
    pageTitle: { fontFamily: "'Lora', serif", fontSize: 28, fontWeight: 700, color: c.brown, margin: "0 0 6px" },
    pageSub: { fontSize: 13, color: "#6b5a4e", margin: 0 },
    eyebrow: { fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", color: c.sage, fontWeight: 700, marginBottom: 14 },
    card: { background: c.offwhite, borderRadius: 16, padding: "32px 36px", boxShadow: "0 2px 20px rgba(61,28,2,0.06)", marginBottom: 20 },
    btn: { background: c.brown, color: c.offwhite, border: "none", borderRadius: 10, padding: "13px 28px", fontSize: 13, fontWeight: 600, fontFamily: "'Poppins', sans-serif", cursor: "pointer", letterSpacing: "0.04em" },
    btnSm: { background: c.brown, color: c.offwhite, border: "none", borderRadius: 8, padding: "8px 18px", fontSize: 12, fontWeight: 600, fontFamily: "'Poppins', sans-serif", cursor: "pointer" },
    btnOutline: { background: "transparent", color: c.brown, border: `2px solid ${c.brown}`, borderRadius: 10, padding: "11px 24px", fontSize: 13, fontWeight: 600, fontFamily: "'Poppins', sans-serif", cursor: "pointer" },
    btnGhost: { background: "transparent", color: c.muted, border: `1px solid ${c.border}`, borderRadius: 8, padding: "7px 14px", fontSize: 11, fontWeight: 600, fontFamily: "'Poppins', sans-serif", cursor: "pointer" },
    input: { width: "100%", padding: "12px 16px", borderRadius: 10, border: `2px solid ${c.border}`, background: c.cream, fontSize: 14, fontFamily: "'Poppins', sans-serif", color: c.brown, outline: "none", boxSizing: "border-box" },
    inputSm: { padding: "9px 14px", borderRadius: 8, border: `1.5px solid ${c.border}`, background: c.cream, fontSize: 13, fontFamily: "'Poppins', sans-serif", color: c.brown, outline: "none", flex: 1 },
    progressBar: (pct) => ({
      height: 6, borderRadius: 6, background: c.light, overflow: "hidden",
      position: "relative",
    }),
  };

  // DASHBOARD
  if (screen === "dashboard") {
    return (
      <div style={S.wrap}>
        <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <div style={S.inner}>
          <div style={S.header}>
            <p style={S.brandLabel}>The Burks Collective</p>
            <h1 style={S.pageTitle}>Product Creation Tracker</h1>
            <p style={S.pageSub}>From idea to launched — one milestone at a time.</p>
          </div>

          {products.length === 0 ? (
            <div style={S.card}>
              <p style={S.eyebrow}>Get Started</p>
              <p style={{ fontSize: 15, color: c.brown, lineHeight: 1.8, marginBottom: 24 }}>
                You don't have any products in progress yet. Add your first one and let's get moving.
              </p>
              <button style={S.btn} onClick={() => setScreen("new")}>Add My First Product</button>
            </div>
          ) : (
            <>
              <p style={S.eyebrow}>Your Products</p>
              {products.map((p) => {
                const pct = calcProgress(p);
                const stage = currentStage(p);
                return (
                  <div key={p.id} style={{ ...S.card, cursor: "pointer", transition: "box-shadow 0.2s" }}
                    onClick={() => { setActiveId(p.id); setActiveStageId(p.stages[0]?.id); setScreen("detail"); }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                      <div>
                        <h2 style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 700, color: c.brown, margin: "0 0 4px" }}>{p.name}</h2>
                        <p style={{ fontSize: 12, color: c.muted, margin: 0 }}>Current stage: <strong style={{ color: c.sage }}>{stage}</strong></p>
                      </div>
                      <span style={{ fontFamily: "'Lora', serif", fontSize: 26, fontWeight: 700, color: c.brown }}>{pct}%</span>
                    </div>
                    <div style={S.progressBar(pct)}>
                      <div style={{ height: "100%", width: `${pct}%`, background: c.sage, borderRadius: 6, transition: "width 0.5s ease" }} />
                    </div>
                    <p style={{ fontSize: 12, color: c.muted, marginTop: 10, fontStyle: "italic" }}>{motivation(pct)}</p>
                  </div>
                );
              })}
              <button style={{ ...S.btn, marginTop: 8 }} onClick={() => setScreen("new")}>+ Add Another Product</button>
            </>
          )}
        </div>
      </div>
    );
  }

  // NEW PRODUCT
  if (screen === "new") {
    return (
      <div style={S.wrap}>
        <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <div style={S.inner}>
          <div style={S.header}>
            <p style={S.brandLabel}>The Burks Collective</p>
            <h1 style={S.pageTitle}>New Product</h1>
            <p style={S.pageSub}>Name it and let's build it.</p>
          </div>
          <div style={S.card}>
            <p style={S.eyebrow}>Product Name</p>
            <p style={{ fontSize: 14, color: "#6b5a4e", marginBottom: 16, lineHeight: 1.7 }}>A working title is fine. You can refine it later.</p>
            <input
              style={{ ...S.input, marginBottom: 28 }}
              placeholder="e.g. 90-Day Budget Reset Guide"
              value={newName}
              onChange={(e) => setNewName(e.target.value)}
            />
            <p style={{ ...S.eyebrow, marginBottom: 12 }}>Your Stages</p>
            <p style={{ fontSize: 13, color: "#6b5a4e", marginBottom: 20, lineHeight: 1.7 }}>
              These six pre-set stages will walk you from idea to launched. You can add, rename, or remove tasks inside each stage after you start.
            </p>
            {PRESET_STAGES.map((s, i) => (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", borderBottom: i < PRESET_STAGES.length - 1 ? `1px solid ${c.light}` : "none" }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: c.sage, display: "flex", alignItems: "center", justifyContent: "center", color: c.offwhite, fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{i + 1}</div>
                <div>
                  <p style={{ fontSize: 14, fontWeight: 600, color: c.brown, margin: "0 0 2px" }}>{s.name}</p>
                  <p style={{ fontSize: 12, color: c.muted, margin: 0 }}>{s.description}</p>
                </div>
              </div>
            ))}
            <div style={{ display: "flex", gap: 14, marginTop: 32 }}>
              <button
                style={{ ...S.btn, ...((!newName.trim()) ? { opacity: 0.35, cursor: "not-allowed" } : {}) }}
                disabled={!newName.trim()}
                onClick={() => {
                  const p = defaultProduct();
                  p.name = newName.trim();
                  setProducts((prev) => [...prev, p]);
                  setActiveId(p.id);
                  setActiveStageId(p.stages[0]?.id);
                  setNewName("");
                  setScreen("detail");
                }}
              >
                Start Tracking
              </button>
              <button style={S.btnOutline} onClick={() => setScreen("dashboard")}>Back</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // DETAIL VIEW
  if (screen === "detail" && activeProduct) {
    const pct = calcProgress(activeProduct);
    const stage = currentStage(activeProduct);
    const activeStage = activeProduct.stages.find((s) => s.id === activeStageId) || activeProduct.stages[0];

    return (
      <div style={S.wrap}>
        <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <div style={S.inner}>
          <div style={S.header}>
            <button style={{ ...S.btnGhost, marginBottom: 16 }} onClick={() => setScreen("dashboard")}>← All Products</button>
            <p style={S.brandLabel}>The Burks Collective</p>
            <h1 style={S.pageTitle}>{activeProduct.name}</h1>
          </div>

          {/* At a Glance */}
          <div style={{ ...S.card, background: c.brown, marginBottom: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
              <div>
                <p style={{ fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", color: c.taupe, fontWeight: 700, marginBottom: 6 }}>Overall Progress</p>
                <p style={{ fontSize: 11, color: c.taupe, margin: "8px 0 0" }}>Current Stage: <strong style={{ color: c.offwhite }}>{stage}</strong></p>
              </div>
              <span style={{ fontFamily: "'Lora', serif", fontSize: 48, fontWeight: 700, color: c.offwhite, lineHeight: 1 }}>{pct}%</span>
            </div>
            <div style={{ height: 6, borderRadius: 6, background: "rgba(255,255,255,0.15)", overflow: "hidden", marginBottom: 14 }}>
              <div style={{ height: "100%", width: `${pct}%`, background: c.sage, borderRadius: 6, transition: "width 0.5s ease" }} />
            </div>
            <p style={{ fontSize: 13, color: "rgba(240,237,232,0.8)", fontStyle: "italic", margin: 0, lineHeight: 1.6 }}>{motivation(pct)}</p>
          </div>

          {/* Stage Tabs */}
          <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 20, paddingBottom: 4 }}>
            {activeProduct.stages.map((s, i) => {
              const stagePct = s.tasks.length ? Math.round(s.tasks.filter((t) => t.done).length / s.tasks.length * 100) : 0;
              const isActive = s.id === activeStageId;
              return (
                <button key={s.id} onClick={() => setActiveStageId(s.id)} style={{
                  flexShrink: 0, padding: "10px 18px", borderRadius: 10,
                  border: isActive ? `2px solid ${c.brown}` : `2px solid ${c.border}`,
                  background: isActive ? c.brown : c.offwhite,
                  color: isActive ? c.offwhite : c.brown,
                  fontSize: 12, fontWeight: 700, fontFamily: "'Poppins', sans-serif", cursor: "pointer",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                }}>
                  <span>{i + 1}. {s.name}</span>
                  <span style={{ fontSize: 10, opacity: 0.7 }}>{stagePct}%</span>
                </button>
              );
            })}
            <button onClick={() => setAddingStage(true)} style={{
              flexShrink: 0, padding: "10px 18px", borderRadius: 10,
              border: `2px dashed ${c.border}`, background: "transparent",
              color: c.muted, fontSize: 12, fontWeight: 600, fontFamily: "'Poppins', sans-serif", cursor: "pointer",
            }}>+ Stage</button>
          </div>

          {/* Add Stage */}
          {addingStage && (
            <div style={{ ...S.card, marginBottom: 16 }}>
              <p style={S.eyebrow}>Add Custom Stage</p>
              <div style={{ display: "flex", gap: 10 }}>
                <input style={S.inputSm} placeholder="Stage name" value={newStageText} onChange={(e) => setNewStageText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addStage()} />
                <button style={S.btnSm} onClick={addStage}>Add</button>
                <button style={S.btnGhost} onClick={() => setAddingStage(false)}>Cancel</button>
              </div>
            </div>
          )}

          {/* Active Stage Tasks */}
          {activeStage && (
            <div style={S.card}>
              <div style={{ marginBottom: 24 }}>
                <h2 style={{ fontFamily: "'Lora', serif", fontSize: 20, fontWeight: 700, color: c.brown, margin: "0 0 4px" }}>{activeStage.name}</h2>
                <p style={{ fontSize: 13, color: c.muted, margin: 0 }}>{activeStage.description}</p>
              </div>

              {activeStage.tasks.map((task, i) => (
                <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 14, padding: "14px 0", borderBottom: `1px solid ${c.light}` }}>
                  <button
                    onClick={() => toggleTask(activeStage.id, i)}
                    style={{
                      width: 22, height: 22, borderRadius: 6, flexShrink: 0, marginTop: 2,
                      border: task.done ? "none" : `2px solid ${c.border}`,
                      background: task.done ? c.sage : "transparent",
                      cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                    }}
                  >
                    {task.done && <span style={{ color: c.offwhite, fontSize: 12, fontWeight: 700 }}>✓</span>}
                  </button>
                  {editingTask && editingTask.stageId === activeStage.id && editingTask.index === i ? (
                    <div style={{ display: "flex", gap: 8, flex: 1 }}>
                      <input style={S.inputSm} value={newTaskText} onChange={(e) => setNewTaskText(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === "Enter") {
                            updateProduct(activeId, (p) => ({ ...p, stages: p.stages.map((s) => s.id === activeStage.id ? { ...s, tasks: s.tasks.map((t, ti) => ti === i ? { ...t, text: newTaskText } : t) } : s) }));
                            setEditingTask(null); setNewTaskText("");
                          }
                        }} />
                      <button style={S.btnSm} onClick={() => {
                        updateProduct(activeId, (p) => ({ ...p, stages: p.stages.map((s) => s.id === activeStage.id ? { ...s, tasks: s.tasks.map((t, ti) => ti === i ? { ...t, text: newTaskText } : t) } : s) }));
                        setEditingTask(null); setNewTaskText("");
                      }}>Save</button>
                    </div>
                  ) : (
                    <span style={{ fontSize: 14, color: task.done ? c.muted : c.brown, textDecoration: task.done ? "line-through" : "none", flex: 1, lineHeight: 1.6 }}>{task.text}</span>
                  )}
                  <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                    <button style={{ ...S.btnGhost, padding: "4px 10px", fontSize: 11 }} onClick={() => { setEditingTask({ stageId: activeStage.id, index: i }); setNewTaskText(task.text); }}>Edit</button>
                    <button style={{ ...S.btnGhost, padding: "4px 10px", fontSize: 11, color: "#b07070" }} onClick={() => deleteTask(activeStage.id, i)}>✕</button>
                  </div>
                </div>
              ))}

              {addingTaskStage === activeStage.id ? (
                <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
                  <input style={S.inputSm} placeholder="Add a task" value={newTaskText} onChange={(e) => setNewTaskText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addTask(activeStage.id)} />
                  <button style={S.btnSm} onClick={() => addTask(activeStage.id)}>Add</button>
                  <button style={S.btnGhost} onClick={() => { setAddingTaskStage(null); setNewTaskText(""); }}>Cancel</button>
                </div>
              ) : (
                <button style={{ ...S.btnGhost, marginTop: 16 }} onClick={() => { setAddingTaskStage(activeStage.id); setNewTaskText(""); }}>+ Add Task</button>
              )}
            </div>
          )}

          <div style={{ display: "flex", gap: 14, marginTop: 8 }}>
            <button style={S.btnOutline} onClick={() => { setProducts((prev) => prev.filter((p) => p.id !== activeId)); setScreen("dashboard"); }}>
              Remove Product
            </button>
          </div>
        </div>
      </div>
    );
  }

  return null;
}


const domContainer = document.getElementById('root');
const root = ReactDOM.createRoot(domContainer);
root.render(React.createElement(ProductCreationTracker));
</script>
</body>
</html>
